name: "Test: Account Menu"

on:
  pull_request:
    paths:
      - 'electron/src/renderer/src/components/shared/UserAvatar.tsx'
      - 'electron/src/renderer/src/components/shared/Navigation.tsx'
      - 'electron/src/renderer/src/store/authStore.ts'
      - 'electron/tests/unit/UserAvatar.test.tsx'
      - 'electron/tests/unit/Navigation.test.tsx'
      - 'specs/user-avatar*'
      - 'specs/navigation-avatar*'
  push:
    branches: [main]
    paths:
      - 'electron/src/renderer/src/components/shared/UserAvatar.tsx'
      - 'electron/src/renderer/src/components/shared/Navigation.tsx'
      - 'electron/src/renderer/src/store/authStore.ts'

jobs:
  unit-tests:
    name: UserAvatar + Navigation unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        working-directory: electron
        run: npm ci

      - name: Run account-menu tests
        working-directory: electron
        run: npx vitest run UserAvatar Navigation
